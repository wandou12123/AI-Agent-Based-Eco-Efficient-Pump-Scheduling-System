services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: pump_station
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: root123
      MYSQL_DATABASE: pump_station
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      USE_CELERY: "true"
      LLM_API_BASE_URL: ${LLM_API_BASE_URL:-https://aicode.cat}
      LLM_API_KEY: ${LLM_API_KEY:-sk-placeholder}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME:-claude-sonnet-4-6}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-docker-dev-secret}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build: ./backend
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=2
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: root123
      MYSQL_DATABASE: pump_station
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      USE_CELERY: "true"
      LLM_API_BASE_URL: ${LLM_API_BASE_URL:-https://aicode.cat}
      LLM_API_KEY: ${LLM_API_KEY:-sk-placeholder}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME:-claude-sonnet-4-6}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-docker-dev-secret}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  uploads_data:
